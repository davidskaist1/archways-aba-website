<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 62" role="img" aria-label="Archways ABA logo mark">
  <defs>
    <!-- Steel-silver at apex fading to deep navy at base -->
    <linearGradient id="gArch" x1="0.35" y1="0" x2="0.65" y2="1">
      <stop offset="0%"   stop-color="#C8DCEC"/>
      <stop offset="20%"  stop-color="#8BB0C8"/>
      <stop offset="58%"  stop-color="#4A7A96"/>
      <stop offset="100%" stop-color="#1B3850"/>
    </linearGradient>
    <!-- Inner-left concave face: catches light like stainless steel -->
    <linearGradient id="gShine" x1="0" y1="0.1" x2="1" y2="0.9">
      <stop offset="0%"   stop-color="rgba(210,238,255,0.58)"/>
      <stop offset="100%" stop-color="rgba(210,238,255,0)"/>
    </linearGradient>
  </defs>

  <!--
    True catenary shape:
    - Legs are nearly VERTICAL at the base (control points directly above start)
    - Curve sweeps inward only in the upper ~40% of the arch
    - Wide base, near-point apex — matching the real Gateway Arch silhouette
  -->
  <path d="M 3,62 C 3,18 16,2 28,2 C 40,2 53,18 53,62 L 45,62 C 45,24 32,8 28,8 C 24,8 11,24 11,62 Z"
        fill="url(#gArch)"/>

  <!-- Highlight on inner-left concave surface -->
  <path d="M 11,62 C 11,24 24,8 28,8 L 19,62 Z"
        fill="url(#gShine)"/>

  <!-- Apex glow — stainless steel catching the light at the top -->
  <ellipse cx="28" cy="4" rx="3.5" ry="1.8" fill="rgba(228,246,255,0.82)"/>
</svg>
